<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gold Bird — App Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0C10; --surface:#14171F; --surface-2:#1A1E28; --stub:#101319;
    --border:rgba(201,162,39,0.3); --border-soft:rgba(242,239,230,0.08);
    --gold:#C9A227; --gold-light:#E8C874; --gold-pale:#F4E7C4;
    --text:#F2EFE6; --text-dim:#9C9A90; --text-faint:#6B6A63;
    --danger:#D96C5F; --bronze:#B08D57; --silver:#C7CAD1;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; padding:1.25rem 0.9rem 4rem;}
  .wrap{max-width:420px; margin:0 auto;}

  .navrow{display:flex; align-items:center; justify-content:space-between; margin-bottom:1.1rem; gap:10px;}
  .navrow img{height:32px; flex-shrink:0;}
  .navrow .tag{font-size:10.5px; color:var(--text-faint); letter-spacing:0.3px; flex-shrink:0;}
  .nav-right{display:flex; align-items:center; gap:9px;}

  .bellbtn{position:relative; background:var(--surface-2); border:1px solid var(--border-soft); width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--gold-light); flex-shrink:0;}
  .bellbtn:active{transform:scale(0.95);}
  .bell-badge{position:absolute; top:-2px; right:-2px; background:var(--gold); color:#1A1400; font-size:9px; font-weight:800; width:14px; height:14px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1.5px solid var(--bg);}
  .bell-popover{position:fixed; top:58px; right:16px; z-index:9996; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 16px; max-width:240px; box-shadow:0 20px 40px rgba(0,0,0,0.45); opacity:0; transform:translateY(-8px) scale(0.95); pointer-events:none; transition:all .25s cubic-bezier(.34,1.56,.64,1);}
  .bell-popover.open{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
  .bell-popover strong{font-family:'Fraunces',serif; color:var(--gold-light); font-size:13.5px; display:block; margin-bottom:4px;}
  .bell-popover p{font-size:12px; color:var(--text-dim); line-height:1.5;}
  @media(max-width:400px){ .bell-popover{right:10px; left:10px; max-width:none;} }

  .tabbar{display:flex; background:var(--surface); border:1px solid var(--border-soft); border-radius:999px; padding:3px; margin-bottom:1.2rem; overflow-x:auto;}
  .tabbtn{flex:1; border:none; background:transparent; color:var(--text-dim); font-family:'Inter',sans-serif; font-size:10.5px; font-weight:700; padding:9px 2px; border-radius:999px; cursor:pointer; transition:all .2s; white-space:nowrap;}
  .tabbtn.active{background:var(--gold); color:#1A1400; box-shadow:0 2px 8px rgba(201,162,39,0.25);}

  .card{background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius-lg); padding:1.3rem 1.35rem; margin-bottom:1.1rem; box-shadow:0 14px 34px rgba(0,0,0,0.35);}

  .lvl-top{display:flex; align-items:center; justify-content:space-between;}
  .lvl-badge{font-family:'Fraunces',serif; font-weight:600; font-size:14.5px; color:var(--gold-light); display:flex; align-items:center; gap:6px;}
  .emotion{font-size:20px;}
  .statsrow{display:flex; justify-content:space-around; margin:1rem 0 0.9rem; font-size:14px; font-weight:600;}
  .stat{display:flex; flex-direction:column; align-items:center; gap:2px;}
  .stat .ic{font-size:19px;}
  .stat.bump{animation:statBump .4s ease;}
  @keyframes statBump{0%{transform:scale(1);} 40%{transform:scale(1.35);} 100%{transform:scale(1);}}
  .xprow{display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; margin-bottom:6px;}
  .xpbar{width:100%; background:var(--surface-2); border-radius:999px; height:9px; overflow:hidden; border:1px solid var(--border-soft);}
  .xpbar-fill{height:100%; background:linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius:999px; transition:width .6s cubic-bezier(.22,1,.36,1);}
  .next-unlock{font-size:11px; color:var(--text-faint); margin-top:8px; text-align:center;}

  .petcard{text-align:center; position:relative; overflow:hidden;}
  .pet-stage{position:relative; width:170px; height:170px; margin:0.4rem auto 0.6rem; display:flex; align-items:center; justify-content:center;}
  .pet-img{width:145px; height:145px; object-fit:contain; transition:filter .5s;}
  .pet-stage.tier-bronce .pet-img{filter:drop-shadow(0 4px 10px rgba(176,141,87,0.4)) sepia(0.18) brightness(0.88);}
  .pet-stage.tier-plata .pet-img{filter:drop-shadow(0 4px 16px rgba(199,202,209,0.5)) saturate(0.6) brightness(1.08);}
  .pet-stage.tier-oro .pet-img{filter:drop-shadow(0 0 24px rgba(232,200,116,0.75)) brightness(1.18);}
  .pet-stage.mood-feliz .pet-img{animation:petBounce 2.4s ease-in-out infinite;}
  @keyframes petBounce{0%,100%{transform:translateY(0) rotate(-1deg);} 50%{transform:translateY(-8px) rotate(1deg);}}
  .pet-stage.mood-dormido .pet-img{animation:petSway 3.6s ease-in-out infinite;}
  @keyframes petSway{0%,100%{transform:rotate(-3deg);} 50%{transform:rotate(3deg);}}
  .pet-stage.mood-descuidado .pet-img{animation:petDroop 3s ease-in-out infinite; filter:grayscale(0.5) brightness(0.65);}
  @keyframes petDroop{0%,100%{transform:translateY(0) rotate(4deg);} 50%{transform:translateY(4px) rotate(6deg);}}
  .pet-name{font-family:'Fraunces',serif; font-size:17px; font-weight:600; color:var(--text); margin-top:2px;}
  .pet-tier-label{font-size:11.5px; color:var(--gold-light); letter-spacing:0.3px; text-transform:uppercase; font-weight:600;}
  .zzz{position:absolute; top:10px; right:calc(50% - 60px); font-family:'Fraunces',serif; font-style:italic; color:var(--gold-pale); font-size:15px; opacity:0; animation:zzzFloat 3.6s ease-in-out infinite;}
  @keyframes zzzFloat{0%{opacity:0; transform:translateY(0);} 20%{opacity:0.8;} 80%{opacity:0;} 100%{opacity:0; transform:translateY(-24px);}}

  .mission-head h2{font-family:'Fraunces',serif; font-size:15.5px; font-weight:600;}
  .mission-reward{font-size:11px; font-weight:600; color:var(--gold-light); background:rgba(201,162,39,0.12); border:1px solid var(--border); padding:3px 9px; border-radius:999px; display:inline-block; margin-top:8px;}
  .mission-desc{font-size:12.5px; color:var(--text-dim); margin-top:8px;}
  .btn{border:none; border-radius:var(--radius-md); padding:13px 18px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; letter-spacing:0.2px; transition:all .2s; width:100%;}
  .btn:active{transform:scale(0.98);}
  .btn-gold{background:var(--gold); color:#1A1400; box-shadow:0 4px 14px rgba(201,162,39,0.3);}
  .btn-gold:hover{background:var(--gold-light);}
  .btn-gold:disabled{opacity:0.4; cursor:not-allowed; box-shadow:none;}
  .btn-ghost{background:var(--surface-2); color:var(--text-dim); border:1px solid var(--border-soft); font-weight:600; font-size:12px; padding:10px; border-radius:var(--radius-md); cursor:pointer;}
  .btn-ghost:hover{color:var(--gold-light); border-color:var(--border);}
  .mission-claimed{margin-top:1rem; font-size:11.5px; color:var(--text-faint); text-align:center;}

  .devbox{border:1px dashed var(--border-soft); border-radius:var(--radius-md); padding:0.9rem; display:flex; gap:8px;}
  .devbox .btn-ghost{flex:1; width:auto;}
  .devnote{font-size:10.5px; color:var(--text-faint); margin-top:9px; line-height:1.5; text-align:center;}
  .devnote-inline{font-size:10.5px; color:var(--text-faint); margin-top:10px; line-height:1.5; text-align:center;}

  /* Mi Tarjeta: boarding-pass */
  .pass{display:flex; background:var(--stub); border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border); position:relative; box-shadow:0 14px 34px rgba(0,0,0,0.35); margin-bottom:1.1rem;}
  .pass-main{flex:1; padding:1.3rem 1.3rem 1.2rem; min-width:0;}
  .pass-stub{width:140px; flex-shrink:0; padding:1.2rem 0.8rem; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:var(--surface);}
  .perf{width:0; position:relative; flex-shrink:0; border-left:1.5px dashed rgba(242,239,230,0.18);}
  .perf::before,.perf::after{content:''; position:absolute; left:-9px; width:18px; height:18px; border-radius:50%; background:var(--bg);}
  .perf::before{top:-9px;} .perf::after{bottom:-9px;}
  .eyebrow{font-size:10px; letter-spacing:1.1px; text-transform:uppercase; color:var(--text-faint); font-weight:500;}
  .pass-tier{display:flex; align-items:center; gap:7px; margin-top:5px; flex-wrap:wrap;}
  .tierbadge{font-size:10.5px; font-weight:700; letter-spacing:0.3px; padding:3px 9px; border-radius:999px;}
  .tier-bronce{background:rgba(176,141,87,0.18); color:var(--bronze);}
  .tier-plata{background:rgba(199,202,209,0.16); color:var(--silver);}
  .tier-oro{background:rgba(232,200,116,0.18); color:var(--gold-light);}
  .cycle-tag{font-size:10px; color:var(--text-faint); font-family:'JetBrains Mono',monospace;}
  .stamprow{display:flex; gap:5px; flex-wrap:wrap; margin:0.9rem 0 0.5rem;}
  .stamp{width:29px; height:29px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1.5px solid var(--border-soft); transition:background .3s, border-color .3s;}
  .stamp.filled{background:var(--gold); border-color:var(--gold); animation:stampGlow 2.8s ease-in-out infinite;}
  @keyframes stampGlow{0%,100%{box-shadow:0 0 6px rgba(201,162,39,0.35);} 50%{box-shadow:0 0 16px rgba(232,200,116,0.7);}}
  .stamp.pop{animation:stampDrop .55s cubic-bezier(.34,1.56,.64,1);}
  @keyframes stampDrop{0%{transform:scale(0.2) rotate(-45deg) translateY(-14px); opacity:0;} 60%{transform:scale(1.3) rotate(10deg) translateY(2px); opacity:1;} 100%{transform:scale(1) rotate(0deg) translateY(0); opacity:1;}}
  .stamp img{width:18px; height:18px; object-fit:contain;}
  .stamp-progress{font-size:12px; color:var(--text-dim); margin-bottom:0.6rem;}
  .reward-banner{background:rgba(232,200,116,0.1); border:1px solid var(--gold); border-radius:var(--radius-md); padding:0.75rem 0.9rem; font-size:12px; color:var(--gold-pale); margin-bottom:0.7rem;}
  .qrbox{width:88px; height:88px; background:#000; border-radius:8px; padding:7px;}
  .qrbox svg{width:100%; height:100%;}
  .codetext{font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:1px; color:var(--gold-light); text-align:center;}
  .codelabel{font-size:9px; color:var(--text-faint); text-align:center; letter-spacing:0.2px;}
  @media(max-width:400px){ .pass{flex-direction:column;} .pass-stub{width:100%; flex-direction:row; padding:1rem 1.1rem;} .perf{display:none;} }

  /* Perfil: resumen + datos */
  .inv-title{font-family:'Fraunces',serif; font-size:14.5px; font-weight:600; margin-bottom:10px;}
  .summary-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .summary-item{background:var(--surface-2); border:1px solid var(--border-soft); border-radius:var(--radius-md); padding:0.9rem 0.4rem; text-align:center;}
  .summary-item .ic{font-size:18px; display:block; margin-bottom:4px;}
  .summary-item b{font-family:'JetBrains Mono',monospace; font-size:16px; color:var(--gold-light); display:block;}
  .summary-item .lbl{font-size:9.5px; color:var(--text-faint); margin-top:2px; display:block; line-height:1.3;}

  .profile-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border-soft); font-size:12.5px; color:var(--text-dim);}
  .profile-row:last-of-type{border-bottom:none;}
  .profile-row b{color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12.5px;}

  .dni-box{margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border-soft);}
  .dni-box label{display:block; font-size:11px; color:var(--text-faint); margin-bottom:7px; line-height:1.4;}
  .dni-box input{flex:1; background:var(--surface-2); border:1px solid var(--border-soft); color:var(--text); border-radius:var(--radius-md); padding:10px 12px; font-size:13px; font-family:'JetBrains Mono',monospace; outline:none;}
  .dni-box input:focus{border-color:var(--gold);}

  .comercio-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border-soft);}
  .comercio-row:last-child{border-bottom:none;}
  .comercio-name{font-size:13px; font-weight:600; color:var(--text);}
  .comercio-meta{font-size:11px; color:var(--text-faint); margin-top:2px;}

  /* Cupones */
  .cat-bar{display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin-bottom:1.1rem;}
  .cat-pill{background:var(--surface); border:1px solid var(--border-soft); color:var(--text-dim); padding:7px 13px; border-radius:999px; font-size:11.5px; font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0;}
  .cat-pill.active{background:var(--gold); border-color:var(--gold); color:#1A1400;}
  .coupon-card{background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:1rem; box-shadow:0 12px 28px rgba(0,0,0,0.3);}
  .coupon-top{height:88px; background:var(--stub); display:flex; align-items:center; justify-content:center; font-size:34px; position:relative;}
  .discount-badge{position:absolute; top:10px; right:10px; background:var(--gold); color:#1A1400; padding:3px 9px; font-weight:800; font-size:11px; border-radius:999px;}
  .coupon-body{padding:1.1rem 1.2rem 1.2rem;}
  .coupon-merchant{font-size:10.5px; text-transform:uppercase; letter-spacing:0.4px; color:var(--gold-light); font-weight:700;}
  .coupon-title{font-size:13.5px; font-weight:600; color:var(--text); margin:5px 0 10px; line-height:1.35;}
  .coupon-price-row{display:flex; align-items:baseline; gap:8px;}
  .price-current{font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:700; color:var(--gold-light);}
  .price-old{font-size:12px; color:var(--text-faint); text-decoration:line-through;}
  .coupon-sales{font-size:11px; color:var(--text-faint); margin-top:4px;}
  .coupon-empty{font-size:12.5px; color:var(--text-faint); text-align:center; padding:1.5rem 0;}

  .activity-notif-wrap{position:fixed; top:16px; right:16px; z-index:9997; display:flex; flex-direction:column; gap:8px; max-width:250px; pointer-events:none;}
  .activity-notif{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 14px; font-size:12px; color:var(--text); box-shadow:0 12px 30px rgba(0,0,0,0.45); display:flex; align-items:center; gap:9px; animation:notifSlideIn .35s cubic-bezier(.34,1.56,.64,1);}
  .activity-notif.leaving{animation:notifSlideOut .3s ease forwards;}
  .activity-notif img{width:16px; height:16px; object-fit:contain;}
  @keyframes notifSlideIn{from{transform:translateX(30px); opacity:0;} to{transform:translateX(0); opacity:1;}}
  @keyframes notifSlideOut{to{transform:translateX(30px); opacity:0;}}
  @media(max-width:480px){ .activity-notif-wrap{top:auto; bottom:16px; right:12px; left:12px; max-width:none;} }

  .celebrate-overlay{position:fixed; inset:0; background:rgba(5,6,9,0.75); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:9998; opacity:0; animation:overlayFade .35s ease forwards; padding:1.5rem;}
  @keyframes overlayFade{to{opacity:1;}}
  .celebrate-card{background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:2.2rem 1.8rem; text-align:center; max-width:290px; box-shadow:0 30px 80px rgba(0,0,0,0.6); animation:cardPop .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes cardPop{0%{transform:scale(0.6); opacity:0;} 100%{transform:scale(1); opacity:1;}}
  .celebrate-card .big-ic{font-size:48px; display:block; margin-bottom:0.7rem; animation:iconFloat 1.8s ease-in-out infinite;}
  @keyframes iconFloat{0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-8px) rotate(3deg);}}
  .celebrate-card h3{font-family:'Fraunces',serif; font-size:19px; color:var(--gold-light); margin-bottom:6px;}
  .celebrate-card p{font-size:12.5px; color:var(--text-dim); line-height:1.5;}
  .celebrate-card .tap{font-size:10.5px; color:var(--text-faint); margin-top:1rem;}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(12px); opacity:0; background:var(--gold); color:#1A1400; padding:10px 20px; border-radius:999px; font-size:12.5px; font-weight:700; transition:all .3s cubic-bezier(.34,1.56,.64,1); pointer-events:none; z-index:999; white-space:nowrap; max-width:88vw; overflow:hidden; text-overflow:ellipsis;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<script>
if (!window.storage){
  window.storage = (function(){
    const mem = {};
    let useLocal = true;
    try{ localStorage.setItem('__gb_test__','1'); localStorage.removeItem('__gb_test__'); }catch(e){ useLocal = false; }
    const k = (key, shared) => 'goldbird_game::' + (shared ? 'shared::' : 'local::') + key;
    return {
      async get(key, shared){
        const sk = k(key, shared);
        const raw = useLocal ? localStorage.getItem(sk) : (sk in mem ? mem[sk] : null);
        if (raw === null) throw new Error('Key not found: ' + key);
        return { key, value: raw, shared: !!shared };
      },
      async set(key, value, shared){
        const sk = k(key, shared);
        if (useLocal) localStorage.setItem(sk, value); else mem[sk] = value;
        return { key, value, shared: !!shared };
      },
      async delete(key, shared){
        const sk = k(key, shared);
        if (useLocal) localStorage.removeItem(sk); else delete mem[sk];
        return { key, deleted:true, shared: !!shared };
      }
    };

  BARISTA_HAT: { icon:'🎩', label:'Sombrero de barista', req:'Nivel 5' },
  GOLD_BIRD:   { icon:'🐦', label:'Plumaje Gold Bird', req:'Nivel 10' },
  LEGEND_WINGS:{ icon:'🕊️', label:'Alas de leyenda', req:'Nivel 20' },
};
function calculateLevel(xp){ let c = LEVELS[0]; for (const l of LEVELS){ if (xp >= l.xpRequired) c = l; } return c; }
function nextLevelInfo(xp){ return LEVELS.find(l => l.xpRequired > xp) || null; }
function calculateEmotion(days){
  if (days >= 7) return { key:'descuidado', label:'Descuidado', icon:'😭' };
  if (days >= 3) return { key:'dormido', label:'Dormido', icon:'😴' };
  return { key:'feliz', label:'Feliz', icon:'😀' };
}
function rewardPurchase(player, xpGain, feathersGain){
  const totalXP = player.xp + xpGain;
  const lvlObj = calculateLevel(totalXP);
  const inventory = [...(player.inventory || [])];
  let newlyUnlocked = null;
  if (lvlObj.unlock && !inventory.includes(lvlObj.unlock)){ inventory.push(lvlObj.unlock); newlyUnlocked = lvlObj.unlock; }
  const leveledUp = lvlObj.level > player.level;
  return {
    player: { ...player, xp: totalXP, level: lvlObj.level, hearts: player.hearts+1, attack: player.attack+1, speed: player.speed+1, feathers: player.feathers+feathersGain, inventory },
    leveledUp, newlyUnlocked
  };
}

/* Nivel por plumas (Bronce/Plata/Oro) — reemplaza el sistema "Pollito" */
function tierOf(feathers){
  if (feathers >= 30) return 'oro';
  if (feathers >= 10) return 'plata';
  return 'bronce';
}
const TIER_LABEL = { bronce:'🥉 Bronce', plata:'🥈 Plata', oro:'🥇 Oro' };

function uid(){ return 'gb' + Math.random().toString(36).slice(2,8).toUpperCase(); }
function code6(id){ let h=0; for (let i=0;i<id.length;i++){ h=(h*31+id.charCodeAt(i))>>>0; } return (h%900000+100000).toString(); }
function qrSvg(id){
  const size=11; let h=0; for (let i=0;i<id.length;i++){ h=(h*131+id.charCodeAt(i))>>>0; }
  let bits=[]; let seed=h;
  for (let i=0;i<size*size;i++){ seed=(seed*1103515245+12345)>>>0; bits.push((seed>>16)%2); }
  const cell=100/size; let rects='';
  for (let y=0;y<size;y++){ for (let x=0;x<size;x++){
    const corner=(x<3&&y<3)||(x>size-4&&y<3)||(x<3&&y>size-4);
    const on = corner ? true : bits[y*size+x];
    if (on) rects += `<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="#E8C874"/>`;
  }}
  return `<svg viewBox="0 0 100 100">${rects}</svg>`;
}

const MOCK_COMERCIOS = [
  { icon:'☕', name:'Gold Bird Café', plumas: 34 },
  { icon:'🍕', name:'Pizzería Fuego', plumas: 18 },
  { icon:'💈', name:'Barbería Rey', plumas: 42 },
  { icon:'🧖', name:'Spa Urbano', plumas: 6 },
];

const MOCK_COUPONS = [
  { id:'cp1', merchant:'Gold Bird Café', title:'Combo desayuno completo + bebida caliente', icon:'☕', category:'gastronomia', priceOld:19.90, discountPercent:20, sales:180 },
  { id:'cp2', merchant:'Pizzería Fuego', title:'Pizza familiar mediana, 2 sabores a elegir', icon:'🍕', category:'gastronomia', priceOld:45.00, discountPercent:30, sales:340 },
  { id:'cp3', merchant:'Barbería Rey', title:'Corte + arreglo de barba clásico', icon:'💈', category:'belleza', priceOld:35.00, discountPercent:15, sales:96 },
  { id:'cp4', merchant:'Spa Urbano', title:'Masaje relajante de 45 minutos', icon:'🧖', category:'belleza', priceOld:80.00, discountPercent:25, sales:210 },
  { id:'cp5', merchant:'Gold Bird Café', title:'Torta del día por porción', icon:'🍰', category:'gastronomia', priceOld:12.00, discountPercent:10, sales:64 },
];
const CATEGORIES = [ { key:'todas', label:'Todas' }, { key:'gastronomia', label:'🍔 Gastronomía' }, { key:'belleza', label:'💆 Belleza' } ];
const MIN_DISCOUNT = 15;

async function claimCoupon(id){
  const c = MOCK_COUPONS.find(x=>x.id===id);
  if (!c) return;
  showToast(`🎟️ Cupón activado — código ${code6(c.id+player.clientId)}`);
  playChime('small');
}

const todayStr = (offset) => { const d=new Date(); d.setDate(d.getDate()+(offset||0)); return d.toISOString().slice(0,10); };


function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

let simDayOffset = 0;
let uiState = { tab: 'tarjeta', couponCategory: 'todas' };
async function nextRegistrationOrder(){
  let n = 0;
  try{ const r = await window.storage.get('registration_counter', true); n = parseInt(r.value,10) || 0; }catch(e){ n = 0; }
  n += 1;
  try{ await window.storage.set('registration_counter', String(n), true); }catch(e){}
  return String(n).padStart(8, '0');
}

function freshPlayer(){
  return {
    clientId: uid(), dni: null, registrationOrder: null,
    level:1, xp:0, hearts:4, attack:4, speed:4, feathers:0, inventory:[],
    lastActiveDate: todayStr(0), claimedOn:null, stamps:0, cyclesCompleted:0,
    streak:0, bestStreak:0
  };
}
let player = freshPlayer();
let prevStats = null;
let prevStampsForAnim = null;

async function loadPlayer(){
  try{
    const r = await window.storage.get('player', false);
    const loaded = JSON.parse(r.value);
    player = { ...freshPlayer(), ...loaded };
  }catch(e){}
  if (!player.registrationOrder){
    player.registrationOrder = await nextRegistrationOrder();
    await savePlayer();
  }
  try{ const r2 = await window.storage.get('simDayOffset', false); simDayOffset = parseInt(r2.value,10)||0; }catch(e){ simDayOffset = 0; }
  try{ const r3 = await window.storage.get('tab', false); if (r3 && r3.value) uiState.tab = r3.value; }catch(e){}
}
async function savePlayer(){
  await window.storage.set('player', JSON.stringify(player), false);
  await window.storage.set('simDayOffset', String(simDayOffset), false);
}
function currentToday(){ return todayStr(simDayOffset); }

function registerActivityDay(){
  const gap = daysBetween(player.lastActiveDate, currentToday());
  if (gap === 0){ if (player.streak === 0) player.streak = 1; }
  else if (gap === 1){ player.streak += 1; }
  else { player.streak = 1; }
  if (player.streak > player.bestStreak) player.bestStreak = player.streak;
}

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

let audioCtx = null;
function playChime(kind){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    const notes = kind === 'big' ? [660,880,1320] : [880,1180];
    notes.forEach((freq,i)=>{
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      const t0 = now + i*0.09;
      gain.gain.setValueAtTime(0,t0);
      gain.gain.linearRampToValueAtTime(0.11, t0+0.015);
      gain.gain.exponentialRampToValueAtTime(0.001, t0+0.32);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0); osc.stop(t0+0.35);
    });
  }catch(e){}
}

function notifyGain(html){
  const wrap = document.getElementById('activity-notif-wrap');
  if (!wrap) return;
  const el = document.createElement('div');
  el.className = 'activity-notif';
  el.innerHTML = html;
  wrap.appendChild(el);
  setTimeout(()=>{ el.classList.add('leaving'); setTimeout(()=>el.remove(),320); }, 2600);
}

function confettiBurst(){
  const canvas = document.createElement('canvas');
  canvas.style.position='fixed'; canvas.style.top=0; canvas.style.left=0;
  canvas.style.width='100vw'; canvas.style.height='100vh'; canvas.style.pointerEvents='none'; canvas.style.zIndex=9999;
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#C9A227','#E8C874','#F4E7C4','#F2EFE6'];
  const parts = Array.from({length:130}, () => ({
    x: canvas.width/2 + (Math.random()-0.5)*canvas.width*0.5, y: canvas.height*0.3,
    vx:(Math.random()-0.5)*8, vy:-Math.random()*8-3, r:Math.random()*4+2,
    color: colors[Math.floor(Math.random()*colors.length)], rot:Math.random()*360, vr:(Math.random()-0.5)*10
  }));
  let frame=0;
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p=>{
      p.vy+=0.22; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.r,-p.r*0.6,p.r*2,p.r*1.2); ctx.restore();
    });
    frame++;
    if (frame<90) requestAnimationFrame(tick); else canvas.remove();
  }
  tick();
}

function showCelebration(kind, data){
  const overlay = document.createElement('div');
  overlay.className = 'celebrate-overlay';
  if (kind === 'unlock'){
    const info = UNLOCK_INFO[data];
    overlay.innerHTML = `<div class="celebrate-card"><span class="big-ic">${info.icon}</span><h3>¡Nuevo accesorio!</h3><p>${info.label} — alcanzaste el ${info.req}.</p><p class="tap">Toca para continuar</p></div>`;
  } else if (kind === 'levelup'){
    overlay.innerHTML = `<div class="celebrate-card"><span class="big-ic">⬆️</span><h3>¡Subiste a nivel ${data}!</h3><p>Tu Gold Bird está creciendo. Sigue sumando plumas en cada compra.</p><p class="tap">Toca para continuar</p></div>`;
  } else if (kind === 'card'){
    overlay.innerHTML = `<div class="celebrate-card"><span class="big-ic">🎉</span><h3>¡Tarjeta completa!</h3><p>Canjea tu recompensa en el local. Tu tarjeta se reinicia y sigues sumando plumas.</p><p class="tap">Toca para continuar</p></div>`;
  }
  overlay.addEventListener('click', ()=> overlay.remove());
  document.body.appendChild(overlay);
  confettiBurst();
  playChime('big');
  setTimeout(()=>{ overlay.style.transition='opacity .4s'; overlay.style.opacity='0'; setTimeout(()=>overlay.remove(),400); }, 3000);
}

function toggleBell(e){
  e.stopPropagation();
  document.getElementById('bell-popover').classList.toggle('open');
}
document.addEventListener('click', ()=>{ document.getElementById('bell-popover').classList.remove('open'); });

async function setTab(tab){
  uiState.tab = tab;
  await window.storage.set('tab', tab, false);
  render(false);
}

async function simulatePurchase(){
  registerActivityDay();
  const willComplete = (player.stamps + 1) >= 10;
  player.stamps += 1;
  const { player: updated, leveledUp, newlyUnlocked } = rewardPurchase(player, 10, 1);
  updated.stamps = player.stamps;
  updated.lastActiveDate = currentToday();
  player = updated;
  notifyGain(`<img src="${PET_IMG}" alt=""><span>+1 pluma · +10 XP</span>`);
  playChime('small');
  render(true);

  if (willComplete){
    await savePlayer();
    setTimeout(async ()=>{
      player.stamps = 0; player.cyclesCompleted += 1;
      await savePlayer();
      render(false);
      showCelebration('card', null);
    }, 700);
  } else {
    await savePlayer();
    setTimeout(()=>{
      if (newlyUnlocked) showCelebration('unlock', newlyUnlocked);
      else if (leveledUp) showCelebration('levelup', player.level);
    }, 300);
  }
}

async function claimMission(){
  if (player.claimedOn === currentToday()){ showToast('Ya reclamaste el reto de hoy'); return; }
  registerActivityDay();
  const { player: updated, leveledUp, newlyUnlocked } = rewardPurchase(player, 60, 3);
  updated.lastActiveDate = currentToday();
  updated.claimedOn = currentToday();
  player = updated;
  await savePlayer();
  notifyGain(`<span style="font-size:16px;">🎯</span><span>+3 plumas · +60 XP</span>`);
  playChime('small');
  render(true);
  showToast('🎯 Reto completado');
  setTimeout(()=>{
    if (newlyUnlocked) showCelebration('unlock', newlyUnlocked);
    else if (leveledUp) showCelebration('levelup', player.level);
  }, 300);
}

async function saveDni(){
  const val = document.getElementById('dni-input').value.trim();
  player.dni = val || null;
  await savePlayer();
  render(false);
  showToast(val ? 'Código de usuario actualizado' : 'DNI removido — vuelve al código por orden de registro');
}

async function simulateNextDay(){ simDayOffset += 1; await savePlayer(); render(false); showToast('⏩ Pasó un día (simulado)'); }
async function resetGame(){
  player = freshPlayer();
  player.registrationOrder = await nextRegistrationOrder();
  simDayOffset = 0; prevStats = null; prevStampsForAnim = null;
  await savePlayer(); render(false); showToast('↺ Juego reiniciado');
}

function renderStampRow(stamps, animateIndex){
  let html = '<div class="stamprow">';
  for (let i=0;i<10;i++){
    const filled = i < stamps;
    const pop = animateIndex===i ? ' pop' : '';
    const delayStyle = (filled && i!==animateIndex) ? ` style="animation-delay:${(i*0.22).toFixed(2)}s;"` : '';
    html += `<div class="stamp ${filled?'filled':''}${pop}"${delayStyle}>${filled?`<img src="${PET_IMG}" alt="">`:''}</div>`;
  }
  html += '</div>'; return html;
}

function renderTarjeta(){
  const animateIndex = (prevStampsForAnim !== null && player.stamps > prevStampsForAnim) ? player.stamps - 1 : -1;
  const full = player.stamps >= 10;
  const tier = tierOf(player.feathers);
  const html = `
    <div class="pass">
      <div class="pass-main">
        <div class="eyebrow">Tarjeta de fidelización</div>
        <div class="pass-tier"><span class="tierbadge tier-${tier}">${TIER_LABEL[tier]}</span><span class="cycle-tag">Ciclo #${player.cyclesCompleted + 1}</span></div>
        ${renderStampRow(player.stamps, animateIndex)}
        <p class="stamp-progress">${player.stamps} de 10 sellos ${full ? '— ¡completa!' : 'para tu próxima recompensa'}</p>
        ${full ? '<div class="reward-banner">Tienes una recompensa lista. Muestra este código en caja.</div>' : ''}
      </div>
      <div class="perf"></div>
      <div class="pass-stub">
        <div class="qrbox">${qrSvg(player.clientId)}</div>
        <div class="codetext">${code6(player.clientId)}</div>
        <div class="codelabel">Muestra este código en caja</div>
      </div>
    </div>
    <div class="card">
      <button class="btn btn-gold" onclick="simulatePurchase()">🧾 Simular compra registrada</button>
      <p class="devnote-inline">Cada compra suma 1 sello + 1 pluma + 10 XP — la tarjeta y el juego comparten el mismo progreso.</p>
    </div>
  `;
  prevStampsForAnim = player.stamps;
  return html;
}

function renderMascota(){
  const daysInactive = daysBetween(player.lastActiveDate, currentToday());
  const emotion = calculateEmotion(daysInactive);
  const tier = tierOf(player.feathers);
  const next = nextLevelInfo(player.xp);
  const prevXp = LEVELS.filter(l=>l.xpRequired<=player.xp).slice(-1)[0].xpRequired;
  const span = next ? (next.xpRequired - prevXp) : 1;
  const progress = next ? Math.min(((player.xp - prevXp) / span) * 100, 100) : 100;
  const claimedToday = player.claimedOn === currentToday();

  return `
    <div class="card">
      <div class="lvl-top">
        <span class="lvl-badge">🏅 Nivel ${player.level} · ${TIER_LABEL[tier]}</span>
        <span class="emotion" title="${emotion.label}">${emotion.icon}</span>
      </div>
      <div class="statsrow">
        <div class="stat" id="stat-hearts"><span class="ic">❤️</span>${player.hearts}</div>
        <div class="stat" id="stat-attack"><span class="ic">⚔️</span>${player.attack}</div>
        <div class="stat" id="stat-speed"><span class="ic">⚡</span>${player.speed}</div>
        <div class="stat" id="stat-feathers"><span class="ic">🪶</span>${player.feathers}</div>
      </div>
      <div class="xprow"><span>XP ${player.xp}</span><span>${next ? next.xpRequired : 'MÁX'}</span></div>
      <div class="xpbar"><div class="xpbar-fill" style="width:${progress}%"></div></div>
      ${next ? `<p class="next-unlock">${next.xpRequired - player.xp} XP para nivel ${next.level}${next.unlock ? ' · ' + UNLOCK_INFO[next.unlock].icon + ' ' + UNLOCK_INFO[next.unlock].label : ''}</p>` : `<p class="next-unlock">¡Nivel máximo alcanzado!</p>`}
    </div>

    <div class="card petcard">
      <div class="pet-stage tier-${tier} mood-${emotion.key}" id="pet-stage">
        <img src="${PET_IMG}" class="pet-img" alt="Tu Gold Bird">
        ${emotion.key==='dormido' ? '<div class="zzz">Zzz…</div>' : ''}
      </div>
      <div class="pet-name">Tu Gold Bird</div>
      <div class="pet-tier-label">${TIER_LABEL[tier]} · ${emotion.label}${daysInactive>0 ? ' · ' + daysInactive + 'd sin visitas' : ''}</div>
    </div>

    <div class="card">
      <div class="mission-head"><h2>🎯 Reto de hoy</h2></div>
      <p class="mission-desc">Compra en una cafetería afiliada.</p>
      <span class="mission-reward">+60 XP · +3 🪶 plumas</span>
      <button class="btn btn-gold" style="margin-top:1.1rem;" onclick="claimMission()" ${claimedToday ? 'disabled' : ''}>${claimedToday ? 'Reto completado ✓' : 'Reclamar recompensa'}</button>
      ${claimedToday ? '<p class="mission-claimed">Vuelve mañana por un nuevo reto.</p>' : ''}
    </div>
  `;
}

function setCouponCategory(cat){ uiState.couponCategory = cat; render(false); }

function renderCupones(){
  const eligible = MOCK_COUPONS.filter(c => c.discountPercent >= MIN_DISCOUNT);
  const filtered = uiState.couponCategory === 'todas' ? eligible : eligible.filter(c => c.category === uiState.couponCategory);
  return `
    <div class="cat-bar">
      ${CATEGORIES.map(c => `<button class="cat-pill ${uiState.couponCategory===c.key?'active':''}" onclick="setCouponCategory('${c.key}')">${c.label}</button>`).join('')}
    </div>
    ${filtered.length ? filtered.map(c => {
      const priceNew = (c.priceOld * (1 - c.discountPercent/100)).toFixed(2);
      return `
      <div class="coupon-card">
        <div class="coupon-top">${c.icon}<span class="discount-badge">-${c.discountPercent}%</span></div>
        <div class="coupon-body">
          <span class="coupon-merchant">${c.merchant}</span>
          <div class="coupon-title">${c.title}</div>
          <div class="coupon-price-row"><span class="price-current">S/ ${priceNew}</span><span class="price-old">S/ ${c.priceOld.toFixed(2)}</span></div>
          <div class="coupon-sales">🔥 +${c.sales} canjeados</div>
          <button class="btn btn-gold" style="margin-top:10px;" onclick="claimCoupon('${c.id}')">Ver cupón</button>
        </div>
      </div>`;
    }).join('') : '<div class="coupon-empty">No hay cupones en esta categoría por ahora.</div>'}
    <p class="devnote-inline">Solo se muestran cupones con 15% de descuento o más — la regla se aplica al filtrar, no solo al elegir cuáles mostrar.</p>
  `;
}

function renderPerfil(){
  const userCode = player.dni ? ('USR' + player.dni) : ('USR' + player.registrationOrder);
  const comercios = MOCK_COMERCIOS.map(c => ({ ...c, tier: tierOf(c.plumas) }));
  return `
    <div class="card">
      <div class="inv-title">📊 Resumen</div>
      <div class="summary-grid">
        <div class="summary-item"><span class="ic">🔥</span><b>${player.streak}</b><span class="lbl">Racha</span></div>
        <div class="summary-item"><span class="ic">🪶</span><b>${player.feathers}</b><span class="lbl">Plumas totales</span></div>
        <div class="summary-item"><span class="ic">🏆</span><b>${player.cyclesCompleted}</b><span class="lbl">Premios</span></div>
      </div>
    </div>

    <div class="card">
      <div class="inv-title">👤 Mi perfil</div>
      <div class="profile-row"><span>Código de usuario</span><b>${userCode}</b></div>
      <div class="profile-row"><span>Comercios afiliados</span><b>${comercios.length}</b></div>
      <div class="profile-row"><span>Plumas totales</span><b>${player.feathers}</b></div>
      <div class="profile-row"><span>Mejor racha</span><b>${player.bestStreak} días</b></div>
      <div class="dni-box">
        <label>DNI (opcional). Con DNI tu código es USR+DNI; sin DNI, se usa tu número de orden de registro.</label>
        <div style="display:flex; gap:8px;">
          <input type="text" id="dni-input" inputmode="numeric" placeholder="Ej. 45678912" value="${player.dni||''}" maxlength="8">
          <button class="btn-ghost" onclick="saveDni()">Guardar</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="inv-title">🏪 Niveles por comercio</div>
      ${comercios.map(c => `
        <div class="comercio-row">
          <div><div class="comercio-name">${c.icon} ${c.name}</div><div class="comercio-meta">${c.plumas} plumas</div></div>
          <span class="tierbadge tier-${c.tier}">${TIER_LABEL[c.tier]}</span>
        </div>`).join('')}
    </div>
  `;
}

function render(animateGain){
  document.getElementById('tab-tarjeta').classList.toggle('active', uiState.tab==='tarjeta');
  document.getElementById('tab-mascota').classList.toggle('active', uiState.tab==='mascota');
  document.getElementById('tab-cupones').classList.toggle('active', uiState.tab==='cupones');
  document.getElementById('tab-perfil').classList.toggle('active', uiState.tab==='perfil');
  const app = document.getElementById('app');
  if (uiState.tab === 'tarjeta') app.innerHTML = renderTarjeta();
  else if (uiState.tab === 'mascota') app.innerHTML = renderMascota();
  else if (uiState.tab === 'cupones') app.innerHTML = renderCupones();
  else app.innerHTML = renderPerfil();

  if (animateGain && prevStats && uiState.tab === 'mascota'){
    [['hearts','stat-hearts'],['attack','stat-attack'],['speed','stat-speed'],['feathers','stat-feathers']].forEach(([key,id])=>{
      const el = document.getElementById(id);
      if (el && player[key] > prevStats[key]){ el.classList.add('bump'); setTimeout(()=>el.classList.remove('bump'),400); }
    });
  }
  prevStats = { hearts:player.hearts, attack:player.attack, speed:player.speed, feathers:player.feathers };
}

async function init(){
  await loadPlayer();
  prevStats = { hearts:player.hearts, attack:player.attack, speed:player.speed, feathers:player.feathers };
  prevStampsForAnim = player.stamps;
  render(false);
}
init();
</script>
</body>
